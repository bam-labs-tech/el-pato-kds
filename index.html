<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitchen Monitor - El Pato</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: { 800: '#1a1a1f', 900: '#111114', 950: '#09090b' } },
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #f4f4f5;
            overflow-x: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #09090b;
        }

        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        .ticket-enter {
            animation: slideIn 0.35s ease-out forwards;
        }

        /* ═══ PRINT STYLES ═══ */
        @media screen {
            #printFrame {
                display: none !important;
            }
        }

        @media print {

            html,
            body {
                min-height: 0 !important;
                height: auto !important;
                overflow: visible !important;
                background: #fff !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            #loginScreen,
            #kdsApp {
                display: none !important;
            }

            #printFrame {
                display: block !important;
                position: static !important;
                width: 80mm;
                margin: 0;
                padding: 0;
                font-family: 'Courier New', Courier, monospace !important;
                color: #000 !important;
            }

            @page {
                margin: 0;
                size: auto;
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-40px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>

<body class="bg-zinc-950 h-[100dvh] overflow-hidden flex flex-col relative w-full">

    <!-- ═══ LOCK SCREEN (LOGIN) ═══ -->
    <div id="loginScreen"
        class="absolute inset-0 z-[100] bg-zinc-950 flex flex-col items-center justify-center px-4 w-full">
        <div
            class="bg-dark-900 border border-white/10 rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-amber-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
            <div class="text-6xl mb-4 ml-1">🔒</div>
            <h2 class="text-2xl font-black text-white mb-6 tracking-tight font-fancy">Kitchen Access</h2>
            <input type="password" id="pinInput" placeholder="Enter 4-digit PIN" maxlength="4"
                class="w-full bg-dark-800 text-center text-3xl font-mono text-amber-400 tracking-[0.5em] p-4 rounded-2xl border border-white/10 focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 mb-8 outline-none transition-all placeholder-zinc-600/50">
            <button onclick="verifyPin()"
                class="w-full py-4 bg-amber-500 hover:bg-amber-600 active:scale-[0.98] transition-all text-white font-black text-lg rounded-2xl shadow-[0_4px_15px_rgba(245,158,11,0.2)] border-b-4 border-amber-600">
                Unlock KDS
            </button>
        </div>
    </div>

    <!-- ═══ KDS APP ═══ -->
    <div id="kdsApp" class="hidden flex-1 flex-col w-full h-full overflow-hidden">

        <!-- ═══ KDS HEADER ═══ -->
        <header
            class="bg-dark-900 border-b border-white/10 px-6 py-4 flex items-center justify-between shadow-lg z-40 flex-shrink-0">
            <div class="flex items-center gap-4 border-r border-white/10 pr-6">
                <span class="text-4xl text-amber-500">🦆</span>
                <div class="flex flex-col">
                    <div class="flex items-center gap-3">
                        <h1 class="text-2xl font-black text-white tracking-tight leading-none">Kitchen Monitor</h1>
                        <span id="pendingBadge"
                            class="hidden bg-amber-500 text-zinc-950 font-black text-xs px-2.5 py-0.5 rounded-full shadow-[0_0_10px_rgba(245,158,11,0.5)]">Pending:
                            0</span>
                    </div>
                    <p class="text-[11px] text-amber-500 font-bold tracking-[0.2em] uppercase mt-1">El Pato</p>
                </div>
            </div>

            <!-- Live Indicator & Actions -->
            <div class="flex flex-1 justify-between px-6 items-center">
                <div id="liveIndicator"
                    class="flex items-center gap-2.5 bg-dark-800/50 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 shadow-inner hidden md:flex relative overflow-hidden transition-all duration-300">
                    <div id="liveBg"
                        class="absolute inset-0 bg-emerald-500/10 rounded-full blur-md transition-all duration-300">
                    </div>
                    <div id="liveDot"
                        class="w-3 h-3 rounded-full bg-emerald-400 animate-[pulse_2s_ease-in-out_infinite] shadow-[0_0_15px_1px_rgba(16,185,129,1)] relative z-10 transition-colors duration-300">
                    </div>
                    <span id="liveText"
                        class="text-emerald-400 text-sm font-bold uppercase tracking-wider relative z-10 drop-shadow-[0_0_5px_rgba(16,185,129,0.8)] transition-all duration-300">Live
                        Sync</span>
                </div>

                <div class="flex-1"></div>

                <div class="flex items-center gap-2">
                    <button onclick="generateZReport()" title="Corte de Caja"
                        class="flex items-center justify-center w-11 h-11 rounded-xl active:scale-95 transition-all outline-none hover:bg-zinc-800 text-zinc-400 hover:text-white text-[24px] font-bold leading-none">
                        📊
                    </button>
                    <button id="muteBtn" onclick="toggleMute()" title="Mute/Unmute"
                        class="flex items-center justify-center w-11 h-11 rounded-xl active:scale-95 transition-all outline-none hover:bg-zinc-800 text-zinc-400 hover:text-white text-[24px] font-bold leading-none">
                        🔊
                    </button>
                    <button onclick="toggleFullScreen()" title="Pantalla Completa"
                        class="flex items-center justify-center w-11 h-11 rounded-xl active:scale-95 transition-all outline-none hover:bg-zinc-800 text-zinc-400 hover:text-white text-[28px] font-bold leading-none pb-1">
                        ⛶
                    </button>
                    <button id="recentBtn" onclick="toggleRecentDrawer()" title="Historial Reciente"
                        class="flex items-center gap-2 bg-dark-800 hover:bg-dark-800/80 px-4 py-2.5 rounded-xl border border-white/10 active:scale-95 transition-all outline-none">
                        <span class="text-xl">🕒</span>
                        <span id="recentCountText" class="text-zinc-200 font-bold tracking-wide">Recent</span>
                    </button>
                </div>
            </div>

            <!-- Clock -->
            <div class="text-right border-l border-white/10 pl-6 w-32">
                <div id="clockTime"
                    class="text-3xl font-black text-amber-500 font-mono tracking-tighter leading-none drop-shadow-[0_0_8px_rgba(245,158,11,0.8)]">
                    00:00</div>
            </div>
        </header>

        <!-- ═══ MAIN BOARD ═══ -->
        <main id="mainScroll" class="flex-1 p-6 overflow-y-auto overscroll-y-contain w-full relative"
            style="-webkit-overflow-scrolling: touch;">
            <div id="pullToRefresh"
                class="absolute top-0 left-0 w-full flex justify-center items-center h-16 -mt-16 transition-opacity opacity-0 text-zinc-500 font-bold text-sm gap-2 z-0">
                <span class="animate-spin text-xl">↻</span> Recargando...</div>
            <div id="ticketsContainer"
                class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-start pb-32 w-full relative z-10">
                <!-- Loader State -->
                <div id="loadingMsg"
                    class="col-span-full h-40 flex flex-col items-center justify-center text-zinc-500 gap-4 mt-20">
                    <svg class="animate-spin h-10 w-10 text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    <span class="font-bold text-xl tracking-tight text-zinc-400">Connecting to Webhook...</span>
                </div>
            </div>
        </main>

        <!-- ═══ RECENT ORDERS SIDE DRAWER ═══ -->
        <div id="recentDrawer"
            class="absolute inset-y-0 right-0 w-96 max-w-full bg-zinc-950/70 backdrop-blur-2xl border-l border-white/10 shadow-[0_0_30px_rgba(0,0,0,0.8)] transform translate-x-full transition-transform duration-300 z-50 flex flex-col">
            <div class="p-5 border-b border-white/10 flex justify-between items-center bg-transparent">
                <h3 class="text-xl font-bold text-white flex items-center gap-2 relative"><span
                        class="absolute -inset-1 bg-white/5 blur-lg rounded-full"></span><span
                        class="relative">🕒</span> <span class="relative">Completed</span></h3>
                <button onclick="toggleRecentDrawer()"
                    class="p-2 w-10 h-10 bg-white/5 text-zinc-300 backdrop-blur-md rounded-full hover:bg-white/10 hover:text-white active:scale-95 transition font-bold leading-none flex items-center justify-center border border-white/10">&times;</button>
            </div>
            <div id="recentList" class="p-4 flex-1 overflow-y-auto flex flex-col gap-3">
                <!-- Rendered Items -->
            </div>
        </div>

        <!-- ═══ MODAL Z-REPORT (CORTE DE CAJA) ═══ -->
        <div id="zReportModal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/80 backdrop-blur-sm px-4">
            <div class="bg-dark-900 border border-white/10 rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl relative transform transition-all scale-95 opacity-0 duration-300" id="zReportCard">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-emerald-500/20 rounded-full blur-3xl -mt-10"></div>
                <span class="text-5xl mb-4 block relative z-10">📊</span>
                <h2 class="text-2xl font-black text-white tracking-tight relative z-10">Corte de Turno</h2>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-6 relative z-10">Resumen de Hoy</p>
                
                <div class="bg-dark-800 rounded-2xl p-6 border border-white/5 mb-6 relative z-10">
                    <div class="mb-4">
                        <p class="text-zinc-400 text-sm font-bold">Tickets Completados</p>
                        <p class="text-3xl font-black text-white" id="zTicketsCount">0</p>
                    </div>
                    <div>
                        <p class="text-zinc-400 text-sm font-bold">Ventas Totales</p>
                        <p class="text-4xl font-black text-emerald-400 drop-shadow-[0_0_10px_rgba(16,185,129,0.4)]" id="zTotalSales">$0.00</p>
                    </div>
                </div>
                
                <button onclick="closeZReport()" class="w-full py-4 bg-zinc-800 hover:bg-zinc-700 active:scale-95 transition-all text-white font-black text-lg rounded-2xl border border-white/10 relative z-10">
                    Cerrar Resumen
                </button>
            </div>
        </div>

    </div> <!-- END KDS APP -->

    <!-- ═══ SOUND ALERT ═══ -->
    <audio id="bellSound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>

    <!-- ═══ KDS LOGIC ═══ -->
    <script>
        // ¡Aquí pegas la URL de tu backend que devuelve el JSON de órdenes!
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxLyallT2NNIfT6inzajJrouL510bjR27dLxIpwGo5_yFWXHv0cCJ9kDeSj4ZFL6LOe/exec';
        const KITCHEN_PIN = '1999'; // Año de fundación (Easter Egg)

        // Set de IDs procesados localmente para evitar que suenen alertas de más
        let knownOrderIds = new Set();
        // Base de datos volátil temporal para rerendering rápido sin saturar la red
        let ordersData = [];

        // --- QoL: Quality of Life Variables & Functions ---
        let isMuted = false;

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
        }

        function formatTicketTime(dateString) {
            if (!dateString) return dateString;
            // Si ya viene como HH:mm (corto) se retorna tal cual
            if (dateString.length <= 5) return dateString;
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
            } catch (e) {
                return dateString;
            }
        }

        function generateZReport() {
            let log = JSON.parse(localStorage.getItem('elPatoHistoryLog') || '[]');
            let count = log.length;
            let total = 0;
            log.forEach(order => {
                if (order.total) { // Format check for totals
                    let cleaned = String(order.total).replace(/[^0-9.-]+/g, '');
                    let num = parseFloat(cleaned);
                    if (!isNaN(num)) total += num;
                }
            });
            
            // Inyectar en el DOM del Modal
            document.getElementById('zTicketsCount').innerText = count;
            document.getElementById('zTotalSales').innerText = `$${total.toFixed(2)}`;

            // Mostrar el Modal y Animar (Tailwind)
            const modal = document.getElementById('zReportModal');
            const card = document.getElementById('zReportCard');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                card.classList.remove('scale-95', 'opacity-0');
                card.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeZReport() {
            const modal = document.getElementById('zReportModal');
            const card = document.getElementById('zReportCard');
            
            // Revertir Animación
            card.classList.remove('scale-100', 'opacity-100');
            card.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300); // 300ms de gracia para que haga fade
        }
        let pollingInterval = null;

        // 0. Autenticación Global
        window.onload = () => {
            if (sessionStorage.getItem('kdsAuth') === 'true') unlockApp();
        };

        document.getElementById('pinInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verifyPin();
        });

        // --- HARDWARE / OPERATIONAL LOGIC ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);

        function updateNetworkStatus() {
            const ind = document.getElementById('liveIndicator');
            const bg = document.getElementById('liveBg');
            const dot = document.getElementById('liveDot');
            const text = document.getElementById('liveText');

            if (!ind) return; // Si aún no ha cargado el DOM

            if (navigator.onLine) {
                // Return to Online Premium Style
                bg.className = 'absolute inset-0 bg-emerald-500/10 rounded-full blur-md transition-all duration-300';
                dot.className = 'w-3 h-3 rounded-full bg-emerald-400 animate-[pulse_2s_ease-in-out_infinite] shadow-[0_0_15px_1px_rgba(16,185,129,1)] relative z-10 transition-colors duration-300';
                text.className = 'text-emerald-400 text-sm font-bold uppercase tracking-wider relative z-10 drop-shadow-[0_0_5px_rgba(16,185,129,0.8)] transition-all duration-300';
                text.textContent = 'Live Sync';
            } else {
                // Offline Style
                bg.className = 'absolute inset-0 bg-red-900/20 rounded-full blur-md transition-all duration-300';
                dot.className = 'w-3 h-3 rounded-full bg-zinc-600 shadow-none relative z-10 transition-colors duration-300';
                text.className = 'text-red-400 text-sm font-bold uppercase tracking-wider relative z-10 drop-shadow-none transition-all duration-300';
                text.textContent = 'OFFLINE ⚠️';
            }
        }

        // Ejecutar estado inicial de red
        window.addEventListener('load', updateNetworkStatus);

        function verifyPin() {
            const pin = document.getElementById('pinInput').value;
            console.log('PIN ingresado:', pin);
            if (String(pin).trim() === '1999') {
                sessionStorage.setItem('kdsAuth', 'true');
                unlockApp();
            } else {
                alert('Access Denied. Invalid PIN.');
                document.getElementById('pinInput').value = '';
            }
        }

        function unlockApp() {
            // 1. Mostrar la interfaz (Visibility Logic) forzando inline styles
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('kdsApp').style.display = 'flex';

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('flex');
            document.getElementById('kdsApp').classList.remove('hidden');
            document.getElementById('kdsApp').classList.add('flex');

            // 2. Orden de encendido (Boot Sequence) seguro
            try {
                updateClock();
                setInterval(updateClock, 1000);

                // Mock Data Testing
                /*
                setTimeout(() => {
                    document.getElementById('loadingMsg').style.display = 'none';
                    let now = new Date();
                    let time11m = new Date(now.getTime() - 11 * 60000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
                    let time18m = new Date(now.getTime() - 18 * 60000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
                    
                    const mock = [
                        { id: "MX-291", fecha: time11m, cliente: "Carlos Santana", pedido: "2x Huevos Rancheros\\n1x Café de Olla", notas: "Salsa aparte por favor" },
                        { id: "MX-292", fecha: time18m, cliente: "Maria Gonzalez", pedido: "1x Carne Asada Plate\\n2x Jarritos" }
                    ];
                    ordersData = mock;
                    renderTickets(mock);
                }, 500);
                */

                fetchOrders();
                if (!pollingInterval) pollingInterval = setInterval(fetchOrders, 15000);
            } catch (error) {
                console.error("Boot Sequence Error (Secondary Functions):", error);
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clockTime').textContent = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
            // Forzamos actualización de bordes de tickets cada minuto exacto para activar las alertas rojas/amarillas sin fetch
            if (now.getSeconds() === 0 && document.getElementById('kdsApp').classList.contains('flex')) {
                renderTickets(ordersData);
            }
        }

        // --- FETCH POLLING ---
        async function fetchOrders() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                if (!response.ok) return;

                const data = await response.json();
                ordersData = Array.isArray(data) ? data : (data.orders || []);
                renderTickets(ordersData);
            } catch (error) {
                console.error("Polling Error:", error);
            }
        }

        // --- FASE 3: CALCULO DE TIEMPO Y SEMÁFORO ---
        function getOrderDelays(orderTimeStr) {
            // Asume strings horarias del tipo "15:30"
            if (!orderTimeStr) return 0;

            const now = new Date();
            const [hours, minutes] = orderTimeStr.split(/[:]/).map(Number);

            if (isNaN(hours) || isNaN(minutes)) return 0;

            const orderDate = new Date();
            orderDate.setHours(hours, minutes, 0, 0);

            // Ajuste por si fue pedido de la noche anterior (ej. 23:50 y ahora es 00:10)
            if (orderDate > now && (orderDate.getHours() > 22 && now.getHours() < 2)) {
                orderDate.setDate(orderDate.getDate() - 1);
            }

            const diffMins = Math.floor((now - orderDate) / 60000);
            return diffMins > 0 ? diffMins : 0;
        }

        // --- RENDERIZADO PRINCIPAL ---
        function renderTickets(orders) {
            const container = document.getElementById('ticketsContainer');
            const completedIds = JSON.parse(localStorage.getItem('elPatoCompleted') || '[]');

            let hasNewTicket = false;
            const pendingOrders = orders.filter(o => o.estado !== 'COMPLETED' && !completedIds.includes(String(o.id)));

            // Update Live Metrics
            const pendingBadge = document.getElementById('pendingBadge');
            if (pendingOrders.length > 0) {
                pendingBadge.textContent = 'Pending: ' + pendingOrders.length;
                pendingBadge.classList.remove('hidden');
                pendingBadge.classList.add('inline-flex');
            } else {
                pendingBadge.classList.add('hidden');
                pendingBadge.classList.remove('inline-flex');
            }

            const recentLog = JSON.parse(localStorage.getItem('elPatoHistoryLog') || '[]');
            document.getElementById('recentCountText').textContent = recentLog.length > 0 ? `Recent (${recentLog.length})` : 'Recent';

            if (pendingOrders.length === 0) {
                container.innerHTML = `
                    <div id="emptyKitchenMsg" class="col-span-full h-80 flex flex-col items-center justify-center text-zinc-600 gap-5 mt-10">
                        <span class="text-6xl opacity-40">🍽️</span>
                        <h2 class="text-3xl font-black text-zinc-500">Kitchen is Clear</h2>
                        <p class="text-lg font-medium text-zinc-600">Waiting for new incoming orders...</p>
                    </div>`;
                return;
            }

            // Eliminar mensajes vacíos/loader inicial si hay órdenes
            const emptyMsg = document.getElementById('emptyKitchenMsg');
            if (emptyMsg) emptyMsg.remove();
            const loadingMsg = document.getElementById('loadingMsg');
            if (loadingMsg) loadingMsg.remove();

            // FASE DE ELIMINACIÓN (DOM Diffing básico)
            const currentTicketNodes = document.querySelectorAll('[id^="ticket-"]');
            const pendingIdsStr = pendingOrders.map(o => String(o.id));

            currentTicketNodes.forEach(node => {
                const nodeIdStr = node.id.replace('ticket-', '');
                if (!pendingIdsStr.includes(nodeIdStr)) {
                    node.remove();
                }
            });

            // FASE DE ACTUALIZACIÓN/CREACIÓN
            pendingOrders.forEach(order => {
                const orderIdStr = String(order.id);
                // Retiramos hasNewTicket de aquí para pasarlo abajo solo al crear

                // Alertas de Productividad (Semáforo)
                const delayMins = getOrderDelays(order.fecha);
                let borderClass = "border-2 border-amber-200 shadow-[0_10px_40px_rgba(0,0,0,0.3)]";
                let badgeHtml = "";

                if (delayMins >= 15) {
                    borderClass = "border-[4px] border-red-500 shadow-[0_0_20px_rgba(239,68,68,0.5)] animate-[pulse_3s_ease-in-out_infinite]";
                    badgeHtml = `
                    <div class="absolute top-0 right-0 bg-red-600 text-white font-black px-4 py-1.5 rounded-bl-xl text-sm shadow-xl z-20 flex items-center gap-1 badge-container">
                        <span class="animate-bounce block">⚠️</span> 
                        <span>${delayMins}m DELAYED</span>
                    </div>`;
                } else if (delayMins >= 10) {
                    borderClass = "border-[3px] border-amber-400 shadow-[0_0_15px_rgba(251,191,36,0.5)]";
                    badgeHtml = `
                    <div class="absolute top-0 right-0 bg-amber-500 text-white font-bold px-3 py-1 rounded-bl-lg text-xs z-20 badge-container">
                        ${delayMins}m Waiting
                    </div>`;
                }

                const existingTicket = document.getElementById('ticket-' + orderIdStr);

                if (existingTicket) {
                    existingTicket.className = `bg-amber-50 rounded-3xl flex flex-col overflow-hidden relative shadow-2xl ${borderClass}`;
                    const oldBadge = existingTicket.querySelector('.badge-container');
                    if (oldBadge) oldBadge.remove();
                    if (badgeHtml !== '') existingTicket.insertAdjacentHTML('afterbegin', badgeHtml);
                } else {
                    if (!knownOrderIds.has(orderIdStr)) {
                        hasNewTicket = true;
                        knownOrderIds.add(orderIdStr);
                    }

                    const rawItems = order.pedido ? order.pedido.split(/\\n|\\r\\n|\n/) : [];
                    const itemsHtml = rawItems.filter(i => i.trim() !== '').map(item => {
                        const cleanItem = item.trim();
                        const match = cleanItem.match(/^(\\d+x|\\d+ x)(.*)/i);
                        if (match) {
                            return `<li class="py-4 border-b border-zinc-200/80 last:border-0 flex items-start gap-4">
                                    <span class="font-black text-orange-500 text-3xl leading-none drop-shadow-sm mt-0.5">${match[1]}</span>
                                    <span class="font-bold text-zinc-800 text-2xl leading-tight">${match[2]}</span>
                                </li>`;
                        }
                        return `<li class="py-3 border-b border-zinc-200/60 last:border-0 font-bold text-zinc-900 text-xl">${cleanItem}</li>`;
                    }).join('');

                    const ticket = document.createElement('div');
                    ticket.id = 'ticket-' + orderIdStr;
                    ticket.className = `ticket-enter bg-amber-50 rounded-3xl flex flex-col overflow-hidden relative shadow-2xl ${borderClass}`;

                    ticket.innerHTML = `
                    ${badgeHtml}
                    <!-- Header -->
                    <div class="bg-black px-6 py-4 text-white flex items-center justify-between border-b-[6px] border-amber-600 relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-r from-zinc-900 to-black"></div>
                        <div class="z-10 relative">
                            <span class="text-[11px] text-zinc-500 font-black uppercase tracking-widest block mb-0.5">Ticket ID</span>
                            <span class="text-2xl font-black text-white leading-none drop-shadow-[0_0_8px_rgba(255,255,255,0.7)]">#${order.id || 'N/A'}</span>
                        </div>
                        <div class="z-10 relative text-right ${badgeHtml ? 'mr-32' : ''}">
                            <span class="text-[11px] text-zinc-500 font-black uppercase tracking-widest block mb-0.5">Time</span>
                            <span class="text-xl font-bold text-zinc-200 leading-none">${formatTicketTime(order.fecha) || 'Just now'}</span>
                        </div>
                    </div>
                    
                    <!-- Customer -->
                    <div class="bg-amber-100/50 flex-none px-6 py-5 border-b border-amber-200/50">
                        <p class="text-xs text-amber-900/40 font-black uppercase tracking-widest mb-1.5">Customer</p>
                        <h3 class="text-3xl font-black text-zinc-900 tracking-tight leading-none">${order.cliente || order.nombre || 'Walk-in Guest'}</h3>
                        ${order.telefono || order.detalles ? `<p class="text-[10px] text-zinc-500 font-mono tracking-wider mt-1 truncate">📞 ${order.telefono || 'Sin Tel.'} • 📍 ${order.detalles ? order.detalles.split('| Notas:')[0] : 'Ubicación local'}</p>` : ''}
                        ${order.notas ? `<div class="mt-4 bg-red-50 text-red-700 px-5 py-3 rounded-2xl border-[3px] border-dotted border-red-500 text-sm font-black flex items-start gap-3 shadow-inner"><span class="text-red-500 animate-[pulse_1s_ease-in-out_infinite] block text-2xl leading-none">⚠️</span> <span class="text-base">${order.notas}</span></div>` : ''}
                    </div>
                    
                    <!-- Items -->
                    <div class="p-6 flex-1 bg-amber-50/50">
                        <ul class="flex flex-col">${itemsHtml}</ul>
                    </div>
                    
                    <!-- Actions -->
                    <div class="p-5 bg-amber-50 rounded-b-3xl mt-auto flex gap-3 pb-6 border-t border-amber-200/50">
                        <button onclick="printOrder('${orderIdStr}')" class="bg-white hover:bg-zinc-100 text-zinc-800 px-6 py-4 rounded-2xl font-bold active:scale-95 transition-all flex items-center justify-center shadow-md border border-zinc-200 hover:shadow-lg outline-none">
                            <span class="text-2xl">🖨️</span>
                        </button>
                        <button onclick="completeOrder('${orderIdStr}')" class="flex-1 py-4 bg-emerald-500 hover:bg-emerald-400 active:scale-95 transition-all text-white font-black text-xl rounded-2xl shadow-[0_8px_20px_rgba(16,185,129,0.4)] hover:shadow-[0_12px_25px_rgba(16,185,129,0.5)] flex items-center justify-center gap-3 border-b-[5px] border-emerald-700 hover:border-emerald-600 outline-none">
                            <span class="text-2xl leading-none">✅</span> <span>COMPLETAR</span>
                        </button>
                    </div>
                `;
                    container.appendChild(ticket);
                }
            });

            if (hasNewTicket && !isMuted) {
                const bell = document.getElementById('bellSound');
                bell.currentTime = 0;
                bell.play().catch(() => { });
            }

            // Refrescar el Drawer silenciosamente cada vez que repintamos Main Board
            rebuildRecentDrawer();
        }

        // --- FASE 1: GESTIÓN DE ERRORES (UNDO / HISTORIAL) ---
        function completeOrder(idStr) {
            let completedOrders = JSON.parse(localStorage.getItem('elPatoCompleted') || '[]');
            if (!completedOrders.includes(String(idStr))) {
                completedOrders.push(String(idStr));
                localStorage.setItem('elPatoCompleted', JSON.stringify(completedOrders));

                // Extraer el objeto entero para el History Log
                const orderSnapshot = ordersData.find(o => String(o.id) === String(idStr));
                if (orderSnapshot) {
                    let log = JSON.parse(localStorage.getItem('elPatoHistoryLog') || '[]');
                    // Agrega al principio, y recorta a 20 máximos (Performance y Evitar desbordamiento de Storage)
                    log.unshift(orderSnapshot);
                    if (log.length > 20) log = log.slice(0, 20);
                    localStorage.setItem('elPatoHistoryLog', JSON.stringify(log));
                }
            }
            renderTickets(ordersData);

            // Cloud Sync: Optimistic UI POST request (Fire and Forget)
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Evita bloqueos de CORS en peticiones opacas hacia Apps Script
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ action: "complete", id: idStr })
            }).catch(e => console.error("Error silencioso en Cloud Sync:", e));
        }

        function restoreOrder(idStr) {
            // Eliminar de los bloqueados
            let completedOrders = JSON.parse(localStorage.getItem('elPatoCompleted') || '[]');
            completedOrders = completedOrders.filter(id => id !== String(idStr));
            localStorage.setItem('elPatoCompleted', JSON.stringify(completedOrders));

            // Eliminar del Drawer visual
            let log = JSON.parse(localStorage.getItem('elPatoHistoryLog') || '[]');
            log = log.filter(o => String(o.id) !== String(idStr));
            localStorage.setItem('elPatoHistoryLog', JSON.stringify(log));

            // Notifica brevemente por sonido que algo volvió
            const bell = document.getElementById('bellSound');
            bell.currentTime = 0;
            bell.play().catch(() => { });

            renderTickets(ordersData);

            // Cerramos el drawer para enfocarnos en la pantalla nueva
            toggleRecentDrawer(true);
        }

        function toggleRecentDrawer(forceClose = false) {
            const drawer = document.getElementById('recentDrawer');
            if (drawer.classList.contains('translate-x-full') && !forceClose) {
                drawer.classList.remove('translate-x-full');
            } else {
                drawer.classList.add('translate-x-full');
            }
        }

        function rebuildRecentDrawer() {
            const list = document.getElementById('recentList');
            let log = JSON.parse(localStorage.getItem('elPatoHistoryLog') || '[]');

            if (log.length === 0) {
                list.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-zinc-600 gap-3"><span class="text-3xl">🧹</span><p class="font-bold text-center">No recent orders.<br><span class="text-xs font-normal">Complete a ticket to see it here.</span></p></div>';
                return;
            }

            list.innerHTML = log.map(order => `
                <div class="bg-zinc-900/60 backdrop-blur-md p-5 rounded-2xl border border-white/10 flex flex-col gap-2 shadow-xl relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="flex justify-between items-center text-white font-bold relative z-10">
                        <span class="text-zinc-500 font-black uppercase tracking-widest text-[10px] bg-black/40 px-2 py-0.5 rounded-full">#${order.id}</span>
                        <span class="text-amber-500 font-mono text-xs drop-shadow-[0_0_5px_rgba(245,158,11,0.5)]">${order.fecha}</span>
                    </div>
                    <p class="text-xl font-black text-zinc-100 truncate leading-none mt-1 mb-2 relative z-10">${order.cliente || order.nombre}</p>
                    <button onclick="restoreOrder('${order.id}')" class="w-full mt-1 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 py-3 rounded-xl font-black text-sm active:scale-95 transition-all outline-none relative z-10 hover:border-red-500/40 hover:text-red-300 hover:shadow-[0_0_15px_rgba(239,68,68,0.2)]">
                        ↩️ RESTORE TICKET
                    </button>
                </div>
            `).join('');
        }

        // --- FASE 2: IMPRESORAS TÉRMICAS (80MM / COURIER) ---
        function printOrder(idStr) {
            const order = ordersData.find(o => String(o.id) === idStr);
            if (!order) return;

            let oldFrame = document.getElementById('printFrame');
            if (oldFrame) oldFrame.remove();

            const rawItems = order.pedido ? order.pedido.split(/\\n|\\r\\n|\n/) : [];
            const printItemsHtml = rawItems.filter(i => i.trim() !== '').map(item => {
                const cleanItem = item.trim();
                const match = cleanItem.match(/^(\\d+x|\\d+ x)(.*)/i);
                if (match) {
                    return `<li style="padding: 10px 0; border-bottom: 2px dashed #000; display: flex; gap: 10px; align-items: flex-start;">
                                <span style="font-size: 24px; font-weight: 900;">${match[1]}</span>
                                <span style="font-size: 18px; font-weight: bold; line-height: 1.2;">${match[2]}</span>
                            </li>`;
                }
                return `<li style="padding: 10px 0; border-bottom: 2px dashed #000; font-size: 18px; font-weight: bold;">${cleanItem}</li>`;
            }).join('');

            const printFrame = document.createElement('div');
            printFrame.id = 'printFrame';

            printFrame.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px; padding-top: 10px;">
                    <h1 style="font-size: 36px; margin: 0; font-weight: 900; letter-spacing: -2px;">EL PATO</h1>
                    <p style="font-size: 14px; margin: 5px 0 0 0; text-transform: uppercase; font-weight: bold;">Kitchen Ticket</p>
                </div>
                
                <hr style="border-top: 3px solid #000; margin: 15px 0;">
                
                <div style="display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 5px; font-weight: bold;">
                    <span>Order:</span> <span>#${order.id || 'N/A'}</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 16px; font-weight: bold;">
                    <span>Time:</span> <span>${formatTicketTime(order.fecha) || 'Just now'}</span>
                </div>
                
                <div style="border: 4px solid #000; padding: 15px 10px; margin: 20px 0; text-align: center;">
                    <p style="font-size: 14px; text-transform: uppercase; margin: 0 0 8px 0; font-weight: bold;">Customer / Cliente</p>
                    <h2 style="font-size: 28px; font-weight: 900; margin: 0; line-height: 1.1; text-transform: uppercase;">${order.cliente || order.nombre || 'Guest'}</h2>
                    ${order.telefono ? `<p style="font-size: 18px; margin: 10px 0 0 0; font-weight: 900; font-family: monospace;">📞 ${order.telefono}</p>` : ''}
                    ${order.detalles ? `<p style="font-size: 16px; margin: 10px 0 0 0; font-weight: bold; border-top: 1px solid #000; padding-top: 8px;">📍 ${order.detalles.split('| Notas:')[0]}</p>` : ''}
                </div>
                
                ${order.notas ? `<div style="font-size: 16px; font-weight: 900; border: 4px dashed #000; padding: 15px; margin: 20px 0; text-transform: uppercase;">
                    ⚠️ Notas:<br>
                    <span style="font-size: 22px; line-height: 1.2; display: block; margin-top: 5px;">${order.notas}</span>
                </div>` : ''}
                
                <hr style="border-top: 3px solid #000; margin: 20px 0;">
                
                <ul style="list-style: none; padding: 0; margin: 0;">
                    ${printItemsHtml}
                </ul>

                ${order.total ? `
                <hr style="border-top: 3px solid #000; margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 22px; font-weight: 900; padding: 5px 0;">
                    <span>TOTAL:</span>
                    <span>$${order.total}</span>
                </div>` : ''}
                
                <div style="text-align: center; margin-top: 40px; font-size: 14px; padding-bottom: 20px; font-weight: bold;">
                    *** END OF TICKET ***
                </div>
            `;

            document.body.appendChild(printFrame);

            setTimeout(() => {
                window.print();

                // Cleanup para no sobrecargar el navegador de frames invisibles
                window.onafterprint = function () {
                    const frameToRemove = document.getElementById('printFrame');
                    if (frameToRemove) frameToRemove.remove();
                    window.onafterprint = null;
                };

                // Fallback cleanup en caso de que onafterprint falle o no sea soportado
                setTimeout(() => {
                    const frameToRemove = document.getElementById('printFrame');
                    if (frameToRemove) frameToRemove.remove();
                }, 3000);
            }, 300);
        }

        // --- MOTOR DE TOUCH EVENTS (PULL TO REFRESH INTELIGENTE) ---
        const mainEl = document.getElementById('mainScroll');
        const ticketsContainer = document.getElementById('ticketsContainer');
        const ptrIndicator = document.getElementById('pullToRefresh');
        let startY = 0;
        let isPulling = false;

        if (mainEl && ticketsContainer) {
            mainEl.addEventListener('touchstart', (e) => {
                if (mainEl.scrollTop === 0) {
                    startY = e.touches[0].clientY;
                    isPulling = true;
                    ticketsContainer.style.transition = 'none'; // Quitar transición para arrastre suave
                }
            }, { passive: true });

            mainEl.addEventListener('touchmove', (e) => {
                if (!isPulling) return;

                const currentY = e.touches[0].clientY;
                const pullDistance = currentY - startY;

                // Solo actuamos si el usuario hace swipe hacia abajo y está en el tope
                if (pullDistance > 0 && mainEl.scrollTop === 0) {
                    if (e.cancelable) e.preventDefault(); // Bloquear intento nativo rebelde
                    // Resistencia elástica: jalamos hasta un máximo aparente (ej. 80px) simulando tensión
                    const resistDistance = Math.min(pullDistance * 0.4, 80);

                    ticketsContainer.style.transform = `translateY(${resistDistance}px)`;
                    ptrIndicator.style.opacity = Math.min(pullDistance / 65, 1);
                }
            }, { passive: false }); // false es preventDefault-ready

            mainEl.addEventListener('touchend', (e) => {
                if (!isPulling) return;
                isPulling = false;

                const endY = e.changedTouches[0].clientY;
                const pullDistance = endY - startY;

                ticketsContainer.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';

                if (pullDistance > 65 && mainEl.scrollTop === 0) {
                    // Acción superó el umbral, procedemos a recargar
                    ptrIndicator.innerHTML = '<span class="animate-spin text-xl text-amber-500">↻</span> Actualizando KDS...';
                    window.location.reload();
                } else {
                    // No superó el umbral, revertir
                    ticketsContainer.style.transform = 'translateY(0px)';
                    ptrIndicator.style.opacity = 0;
                }
            });
        }

    </script>
</body>

</html>
