<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitchen Monitor - El Pato</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: { 800: '#1a1a1f', 900: '#111114', 950: '#09090b' } },
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #f4f4f5;
            overflow-x: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .ticket-enter {
            animation: slideIn 0.35s ease-out forwards;
        }

        /* ═══ PRINT STYLES ═══ */
        @media screen {
            #printFrame { display: none !important; }
        }
        
        @media print {
            body * {
                visibility: hidden;
            }
            #printFrame, #printFrame * {
                visibility: visible !important;
                color: #000 !important;
                background-color: #fff !important;
            }
            #printFrame {
                position: absolute;
                left: 0;
                top: 0;
                width: 80mm;
                padding: 0;
                margin: 0;
                font-family: 'Courier New', Courier, monospace !important;
            }
            @page { margin: 0; size: auto; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>

<body class="bg-zinc-950 min-h-screen flex flex-col relative w-full overflow-hidden">

    <!-- ═══ LOCK SCREEN (LOGIN) ═══ -->
    <div id="loginScreen" class="absolute inset-0 z-[100] bg-zinc-950 flex flex-col items-center justify-center px-4 w-full">
        <div
            class="bg-dark-900 border border-white/10 rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-amber-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
            <div class="text-6xl mb-4 ml-1">🔒</div>
            <h2 class="text-2xl font-black text-white mb-6 tracking-tight font-fancy">Kitchen Access</h2>
            <input type="password" id="pinInput" placeholder="Enter 4-digit PIN" maxlength="4"
                class="w-full bg-dark-800 text-center text-3xl font-mono text-amber-400 tracking-[0.5em] p-4 rounded-2xl border border-white/10 focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 mb-8 outline-none transition-all placeholder-zinc-600/50">
            <button onclick="verifyPin()"
                class="w-full py-4 bg-amber-500 hover:bg-amber-600 active:scale-[0.98] transition-all text-white font-black text-lg rounded-2xl shadow-[0_4px_15px_rgba(245,158,11,0.2)] border-b-4 border-amber-600">
                Unlock KDS
            </button>
        </div>
    </div>

    <!-- ═══ KDS APP ═══ -->
    <div id="kdsApp" class="hidden flex-1 flex-col w-full h-screen overflow-hidden">
        
        <!-- ═══ KDS HEADER ═══ -->
        <header
            class="bg-dark-900 border-b border-white/10 px-6 py-4 flex items-center justify-between shadow-lg z-40 flex-shrink-0">
            <div class="flex items-center gap-4 border-r border-white/10 pr-6">
                <span class="text-4xl text-amber-500">🦆</span>
                <div class="flex flex-col">
                    <h1 class="text-2xl font-black text-white tracking-tight leading-none">Kitchen Monitor</h1>
                    <p class="text-[11px] text-amber-500 font-bold tracking-[0.2em] uppercase mt-1">El Pato</p>
                </div>
            </div>

            <!-- Live Indicator & Actions -->
            <div class="flex flex-1 justify-between px-6 items-center">
                <div class="flex items-center gap-2.5 bg-dark-800 px-4 py-2 rounded-full border border-white/5 shadow-inner hidden md:flex">
                    <div
                        class="w-3 h-3 rounded-full bg-emerald-500 animate-[pulse_2s_ease-in-out_infinite] shadow-[0_0_12px_rgba(16,185,129,0.9)]">
                    </div>
                    <span class="text-emerald-400 text-sm font-bold uppercase tracking-wider">Live Sync</span>
                </div>
                
                <div class="flex-1"></div>
                
                <button onclick="toggleRecentDrawer()" class="flex items-center gap-2 bg-dark-800 hover:bg-dark-800/80 px-4 py-2.5 rounded-xl border border-white/10 active:scale-95 transition-all outline-none">
                    <span class="text-xl">🕒</span>
                    <span class="text-zinc-200 font-bold tracking-wide">Recent</span>
                </button>
            </div>

            <!-- Clock -->
            <div class="text-right border-l border-white/10 pl-6 w-32">
                <div id="clockTime" class="text-3xl font-black text-amber-500 font-mono tracking-tighter leading-none shadow-[0_0_10px_rgba(245,158,11,0.2)] drop-shadow-md">
                    00:00</div>
            </div>
        </header>

        <!-- ═══ MAIN BOARD ═══ -->
        <main class="flex-1 p-6 overflow-y-auto w-full relative">
            <div id="ticketsContainer"
                class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-start pb-20 w-full relative z-10">
                <!-- Loader State -->
                <div id="loadingMsg"
                    class="col-span-full h-40 flex flex-col items-center justify-center text-zinc-500 gap-4 mt-20">
                    <svg class="animate-spin h-10 w-10 text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    <span class="font-bold text-xl tracking-tight text-zinc-400">Connecting to Webhook...</span>
                </div>
            </div>
        </main>
        
        <!-- ═══ RECENT ORDERS SIDE DRAWER ═══ -->
        <div id="recentDrawer" class="absolute inset-y-0 right-0 w-96 max-w-full bg-dark-900 border-l border-white/10 shadow-2xl transform translate-x-full transition-transform duration-300 z-50 flex flex-col">
            <div class="p-5 border-b border-white/10 flex justify-between items-center bg-dark-950">
                <h3 class="text-xl font-bold text-white flex items-center gap-2"><span>🕒</span> Completed</h3>
                <button onclick="toggleRecentDrawer()" class="p-2 w-10 h-10 bg-dark-800 text-zinc-400 rounded-full hover:bg-white/5 hover:text-white transition font-bold leading-none flex items-center justify-center">&times;</button>
            </div>
            <div id="recentList" class="p-4 flex-1 overflow-y-auto flex flex-col gap-3">
                <!-- Rendered Items -->
            </div>
        </div>
        
    </div> <!-- END KDS APP -->

    <!-- ═══ SOUND ALERT ═══ -->
    <audio id="bellSound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>

    <!-- ═══ KDS LOGIC ═══ -->
    <script>
        // ¡Aquí pegas la URL de tu backend que devuelve el JSON de órdenes!
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxLyallT2NNIfT6inzajJrouL510bjR27dLxIpwGo5_yFWXHv0cCJ9kDeSj4ZFL6LOe/exec';
        const KITCHEN_PIN = '1999'; // Año de fundación (Easter Egg)

        // Set de IDs procesados localmente para evitar que suenen alertas de más
        let knownOrderIds = new Set();
        // Base de datos volátil temporal para rerendering rápido sin saturar la red
        let ordersData = [];
        let pollingInterval = null;

        // 0. Autenticación Global
        window.onload = () => {
            if (sessionStorage.getItem('kdsAuth') === 'true') unlockApp();
        };

        document.getElementById('pinInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verifyPin();
        });

        function verifyPin() {
            const pin = document.getElementById('pinInput').value;
            if (pin === KITCHEN_PIN) {
                sessionStorage.setItem('kdsAuth', 'true');
                unlockApp();
            } else {
                alert('Access Denied. Invalid PIN.');
                document.getElementById('pinInput').value = '';
            }
        }

        function unlockApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('flex');
            document.getElementById('kdsApp').classList.remove('hidden');
            document.getElementById('kdsApp').classList.add('flex');

            updateClock();
            setInterval(updateClock, 1000);

            // Mock Data Testing
            /*
            setTimeout(() => {
                document.getElementById('loadingMsg').style.display = 'none';
                let now = new Date();
                let time11m = new Date(now.getTime() - 11 * 60000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
                let time18m = new Date(now.getTime() - 18 * 60000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
                
                const mock = [
                    { id: "MX-291", fecha: time11m, cliente: "Carlos Santana", pedido: "2x Huevos Rancheros\\n1x Café de Olla", notas: "Salsa aparte por favor" },
                    { id: "MX-292", fecha: time18m, cliente: "Maria Gonzalez", pedido: "1x Carne Asada Plate\\n2x Jarritos" }
                ];
                ordersData = mock;
                renderTickets(mock);
            }, 500);
            */
            
            fetchOrders();
            if (!pollingInterval) pollingInterval = setInterval(fetchOrders, 15000);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clockTime').textContent = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
            // Forzamos actualización de bordes de tickets cada minuto exacto para activar las alertas rojas/amarillas sin fetch
            if (now.getSeconds() === 0 && document.getElementById('kdsApp').classList.contains('flex')) {
                renderTickets(ordersData);
            }
        }

        // --- FETCH POLLING ---
        async function fetchOrders() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                if (!response.ok) return;

                const data = await response.json();
                ordersData = Array.isArray(data) ? data : (data.orders || []);
                renderTickets(ordersData);
            } catch (error) {
                console.error("Polling Error:", error);
            }
        }

        // --- FASE 3: CALCULO DE TIEMPO Y SEMÁFORO ---
        function getOrderDelays(orderTimeStr) {
            // Asume strings horarias del tipo "15:30"
            if (!orderTimeStr) return 0;
            
            const now = new Date();
            const [hours, minutes] = orderTimeStr.split(/[:]/).map(Number);
            
            if (isNaN(hours) || isNaN(minutes)) return 0;

            const orderDate = new Date();
            orderDate.setHours(hours, minutes, 0, 0);

            // Ajuste por si fue pedido de la noche anterior (ej. 23:50 y ahora es 00:10)
            if (orderDate > now && (orderDate.getHours() > 22 && now.getHours() < 2)) {
                orderDate.setDate(orderDate.getDate() - 1);
            }

            const diffMins = Math.floor((now - orderDate) / 60000);
            return diffMins > 0 ? diffMins : 0;
        }

        // --- RENDERIZADO PRINCIPAL ---
        function renderTickets(orders) {
            const container = document.getElementById('ticketsContainer');
            const completedIds = JSON.parse(localStorage.getItem('elPatoCompleted') || '[]');
            
            let hasNewTicket = false;
            const pendingOrders = orders.filter(o => !completedIds.includes(String(o.id)));

            if (pendingOrders.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full h-80 flex flex-col items-center justify-center text-zinc-600 gap-5 mt-10">
                        <span class="text-6xl opacity-40">🍽️</span>
                        <h2 class="text-3xl font-black text-zinc-500">Kitchen is Clear</h2>
                        <p class="text-lg font-medium text-zinc-600">Waiting for new incoming orders...</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';

            pendingOrders.forEach(order => {
                const orderIdStr = String(order.id);
                if (!knownOrderIds.has(orderIdStr)) {
                    hasNewTicket = true;
                    knownOrderIds.add(orderIdStr);
                }

                // Alertas de Productividad (Semáforo)
                const delayMins = getOrderDelays(order.fecha);
                let borderClass = "border-2 border-amber-200 shadow-[0_10px_40px_rgba(0,0,0,0.3)]";
                let badgeHtml = "";

                if (delayMins >= 15) {
                    borderClass = "border-[4px] border-red-500 shadow-[0_0_20px_rgba(239,68,68,0.5)] animate-[pulse_3s_ease-in-out_infinite]";
                    badgeHtml = `
                    <div class="absolute top-0 right-0 bg-red-600 text-white font-black px-4 py-1.5 rounded-bl-xl text-sm shadow-xl z-20 flex items-center gap-1">
                        <span class="animate-bounce block">⚠️</span> 
                        <span>${delayMins}m DELAYED</span>
                    </div>`;
                } else if (delayMins >= 10) {
                    borderClass = "border-[3px] border-amber-400 shadow-[0_0_15px_rgba(251,191,36,0.5)]";
                    badgeHtml = `
                    <div class="absolute top-0 right-0 bg-amber-500 text-white font-bold px-3 py-1 rounded-bl-lg text-xs z-20">
                        ${delayMins}m Waiting
                    </div>`;
                }

                const rawItems = order.pedido ? order.pedido.split(/\\n|\\r\\n|\n/) : [];
                const itemsHtml = rawItems.filter(i => i.trim() !== '').map(item => {
                    const cleanItem = item.trim();
                    const match = cleanItem.match(/^(\\d+x|\\d+ x)(.*)/i);
                    if (match) {
                        return `<li class="py-3 border-b border-zinc-200/60 last:border-0 flex items-start gap-3">
                                    <span class="font-black text-amber-600 text-2xl leading-none mt-0.5">${match[1]}</span>
                                    <span class="font-bold text-zinc-900 text-xl leading-snug">${match[2]}</span>
                                </li>`;
                    }
                    return `<li class="py-3 border-b border-zinc-200/60 last:border-0 font-bold text-zinc-900 text-xl">${cleanItem}</li>`;
                }).join('');

                const ticket = document.createElement('div');
                ticket.className = `ticket-enter bg-amber-50 rounded-b-2xl rounded-t-xl flex flex-col overflow-hidden relative ${borderClass}`;
                
                ticket.innerHTML = `
                    ${badgeHtml}
                    <!-- Header -->
                    <div class="bg-dark-900 px-5 py-4 text-white flex items-center justify-between border-b-[6px] border-amber-500 shadow-sm relative overflow-hidden">
                        <div class="z-10">
                            <span class="text-[11px] text-zinc-400 font-bold uppercase tracking-widest block mb-0.5">Ticket ID</span>
                            <span class="text-xl font-black text-white leading-none">#${order.id || 'N/A'}</span>
                        </div>
                        <div class="z-10 text-right ${badgeHtml ? 'mr-28' : ''}">
                            <span class="text-[11px] text-zinc-400 font-bold uppercase tracking-widest block mb-0.5">Time</span>
                            <span class="text-lg font-bold text-zinc-200 leading-none">${order.fecha || 'Just now'}</span>
                        </div>
                    </div>
                    
                    <!-- Customer -->
                    <div class="bg-amber-100 flex-none px-6 py-4 border-b border-amber-200">
                        <p class="text-xs text-amber-900/60 font-black uppercase tracking-wider mb-1">Customer</p>
                        <h3 class="text-3xl font-black text-zinc-900 tracking-tight leading-none">${order.cliente || order.nombre || 'Walk-in Guest'}</h3>
                        ${order.notas ? `<div class="mt-3 bg-red-100/80 text-red-900 px-4 py-3 rounded-xl border-2 border-red-300 text-sm font-bold flex items-start gap-2 shadow-sm"><span class="text-red-600 block text-lg leading-none mt-0.5">⚠️</span> <span>${order.notas}</span></div>` : ''}
                    </div>
                    
                    <!-- Items -->
                    <div class="p-6 flex-1 bg-white">
                        <ul class="flex flex-col">${itemsHtml}</ul>
                    </div>
                    
                    <!-- Actions -->
                    <div class="p-5 bg-amber-50 border-t border-amber-200/80 mt-auto flex gap-3">
                        <button onclick="printOrder('${orderIdStr}')" class="bg-zinc-200 hover:bg-zinc-300 text-zinc-800 px-5 py-4 rounded-xl font-bold active:scale-[0.95] transition-all flex items-center justify-center shadow-sm border border-zinc-300">
                            <span class="text-2xl">🖨️</span>
                        </button>
                        <button onclick="completeOrder('${orderIdStr}')" class="flex-1 py-4 bg-emerald-500 hover:bg-emerald-600 active:scale-[0.98] transition-all text-white font-black text-xl rounded-xl shadow-[0_6px_20px_rgba(16,185,129,0.35)] flex items-center justify-center gap-3 border-2 border-emerald-400">
                            <span class="text-2xl leading-none">✅</span> <span>COMPLETAR</span>
                        </button>
                    </div>
                `;
                container.appendChild(ticket);
            });

            if (hasNewTicket) {
                const bell = document.getElementById('bellSound');
                bell.currentTime = 0;
                bell.play().catch(() => {});
            }
            
            // Refrescar el Drawer silenciosamente cada vez que repintamos Main Board
            rebuildRecentDrawer();
        }

        // --- FASE 1: GESTIÓN DE ERRORES (UNDO / HISTORIAL) ---
        function completeOrder(idStr) {
            let completedOrders = JSON.parse(localStorage.getItem('elPatoCompleted') || '[]');
            if (!completedOrders.includes(String(idStr))) {
                completedOrders.push(String(idStr));
                localStorage.setItem('elPatoCompleted', JSON.stringify(completedOrders));
                
                // Extraer el objeto entero para el History Log
                const orderSnapshot = ordersData.find(o => String(o.id) === String(idStr));
                if (orderSnapshot) {
                    let log = JSON.parse(localStorage.getItem('elPatoHistoryLog') || '[]');
                    // Agrega al principio, y recorta a 20 máximos (Performance y Evitar desbordamiento de Storage)
                    log.unshift(orderSnapshot);
                    if (log.length > 20) log = log.slice(0, 20);
                    localStorage.setItem('elPatoHistoryLog', JSON.stringify(log));
                }
            }
            renderTickets(ordersData);
        }

        function restoreOrder(idStr) {
            // Eliminar de los bloqueados
            let completedOrders = JSON.parse(localStorage.getItem('elPatoCompleted') || '[]');
            completedOrders = completedOrders.filter(id => id !== String(idStr));
            localStorage.setItem('elPatoCompleted', JSON.stringify(completedOrders));
            
            // Eliminar del Drawer visual
            let log = JSON.parse(localStorage.getItem('elPatoHistoryLog') || '[]');
            log = log.filter(o => String(o.id) !== String(idStr));
            localStorage.setItem('elPatoHistoryLog', JSON.stringify(log));

            // Notifica brevemente por sonido que algo volvió
            const bell = document.getElementById('bellSound');
            bell.currentTime = 0;
            bell.play().catch(() => {});

            renderTickets(ordersData);
            
            // Cerramos el drawer para enfocarnos en la pantalla nueva
            toggleRecentDrawer(true);
        }
        
        function toggleRecentDrawer(forceClose = false) {
            const drawer = document.getElementById('recentDrawer');
            if(drawer.classList.contains('translate-x-full') && !forceClose) {
                drawer.classList.remove('translate-x-full');
            } else {
                drawer.classList.add('translate-x-full');
            }
        }
        
        function rebuildRecentDrawer() {
            const list = document.getElementById('recentList');
            let log = JSON.parse(localStorage.getItem('elPatoHistoryLog') || '[]');
            
            if(log.length === 0) {
                 list.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-zinc-600 gap-3"><span class="text-3xl">🧹</span><p class="font-bold text-center">No recent orders.<br><span class="text-xs font-normal">Complete a ticket to see it here.</span></p></div>';
                 return;
            }
            
            list.innerHTML = log.map(order => `
                <div class="bg-dark-800 p-4 rounded-xl border border-white/5 flex flex-col gap-2 shadow-lg">
                    <div class="flex justify-between items-center text-white font-bold">
                        <span class="text-zinc-400 uppercase text-xs">#${order.id}</span>
                        <span class="text-amber-500 font-mono text-xs">${order.fecha}</span>
                    </div>
                    <p class="text-lg font-black text-zinc-200 truncate leading-none mb-1">${order.cliente || order.nombre}</p>
                    <button onclick="restoreOrder('${order.id}')" class="w-full mt-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 border border-red-500/20 py-2.5 rounded-lg font-bold text-sm active:scale-95 transition-all outline-none">
                        ↩️ Restore Order
                    </button>
                </div>
            `).join('');
        }

        // --- FASE 2: IMPRESORAS TÉRMICAS (80MM / COURIER) ---
        function printOrder(idStr) {
            const order = ordersData.find(o => String(o.id) === idStr);
            if (!order) return;

            let oldFrame = document.getElementById('printFrame');
            if (oldFrame) oldFrame.remove();

            const rawItems = order.pedido ? order.pedido.split(/\\n|\\r\\n|\n/) : [];
            const printItemsHtml = rawItems.filter(i => i.trim() !== '').map(item => {
                const cleanItem = item.trim();
                const match = cleanItem.match(/^(\\d+x|\\d+ x)(.*)/i);
                if (match) {
                    return \`<li style="padding: 10px 0; border-bottom: 2px dashed #000; display: flex; gap: 10px; align-items: flex-start;">
                                <span style="font-size: 24px; font-weight: 900;">\${match[1]}</span>
                                <span style="font-size: 18px; font-weight: bold; line-height: 1.2;">\${match[2]}</span>
                            </li>\`;
                }
                return \`<li style="padding: 10px 0; border-bottom: 2px dashed #000; font-size: 18px; font-weight: bold;">\${cleanItem}</li>\`;
            }).join('');

            const printFrame = document.createElement('div');
            printFrame.id = 'printFrame';
            
            printFrame.innerHTML = \`
                <div style="text-align: center; margin-bottom: 20px; padding-top: 10px;">
                    <h1 style="font-size: 36px; margin: 0; font-weight: 900; letter-spacing: -2px;">EL PATO</h1>
                    <p style="font-size: 14px; margin: 5px 0 0 0; text-transform: uppercase; font-weight: bold;">Kitchen Ticket</p>
                </div>
                
                <hr style="border-top: 3px solid #000; margin: 15px 0;">
                
                <div style="display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 5px; font-weight: bold;">
                    <span>Order:</span> <span>#\${order.id || 'N/A'}</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 16px; font-weight: bold;">
                    <span>Time:</span> <span>\${order.fecha || 'Just now'}</span>
                </div>
                
                <div style="border: 4px solid #000; padding: 15px 10px; margin: 20px 0; text-align: center;">
                    <p style="font-size: 14px; text-transform: uppercase; margin: 0 0 8px 0; font-weight: bold;">Customer / Cliente</p>
                    <h2 style="font-size: 28px; font-weight: 900; margin: 0; line-height: 1.1; text-transform: uppercase;">\${order.cliente || order.nombre || 'Guest'}</h2>
                </div>
                
                \${order.notas ? \`<div style="font-size: 16px; font-weight: 900; border: 4px dashed #000; padding: 15px; margin: 20px 0; text-transform: uppercase;">
                    ⚠️ Notas:<br>
                    <span style="font-size: 22px; line-height: 1.2; display: block; margin-top: 5px;">\${order.notas}</span>
                </div>\` : ''}
                
                <hr style="border-top: 3px solid #000; margin: 20px 0;">
                
                <ul style="list-style: none; padding: 0; margin: 0;">
                    \${printItemsHtml}
                </ul>
                
                <div style="text-align: center; margin-top: 40px; font-size: 14px; padding-bottom: 20px; font-weight: bold;">
                    *** END OF TICKET ***
                </div>
            \`;

            document.body.appendChild(printFrame);
            
            setTimeout(() => {
                window.print();
            }, 100);
        }

    </script>
</body>
