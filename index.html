<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitchen Monitor PRO - El Pato</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: { 800: '#1a1a1f', 900: '#111114', 950: '#09090b' } },
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #09090b; color: #f4f4f5; }
        ::-webkit-scrollbar { display: none; }
        .ticket-enter { animation: slideIn 0.35s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* ESTILOS DE IMPRESIÓN TÉRMICA */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible !important; color: #000 !important; }
            #printArea { position: absolute; left: 0; top: 0; width: 80mm; font-family: 'Courier New', monospace; }
            @page { margin: 0; }
        }
    </style>
</head>
<body class="bg-zinc-950 min-h-screen overflow-hidden">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-zinc-950 flex items-center justify-center px-4">
        <div class="bg-dark-900 border border-white/10 rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <span class="text-5xl mb-4 block text-amber-500">🔒</span>
            <h2 class="text-2xl font-black text-white mb-6">Kitchen Access</h2>
            <input type="password" id="pinInput" placeholder="PIN" maxlength="4" 
                   class="w-full bg-dark-800 text-center text-4xl font-mono text-amber-400 p-4 rounded-2xl border border-white/10 mb-6 outline-none focus:border-amber-500">
            <button onclick="verifyPin()" 
                    class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-white font-black text-xl rounded-2xl shadow-lg active:scale-95 transition-all">
                Unlock KDS
            </button>
        </div>
    </div>

    <div id="kdsApp" class="hidden h-screen flex-col">
        <header class="bg-dark-900 border-b border-white/10 p-4 flex items-center justify-between shadow-xl">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🦆</span>
                <div>
                    <h1 class="font-black text-xl leading-none">Kitchen Monitor <span class="text-amber-500">PRO</span></h1>
                    <p class="text-[10px] uppercase font-bold text-zinc-500 tracking-widest">Restaurante El Pato</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-emerald-500/10 px-3 py-1.5 rounded-full border border-emerald-500/20">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold text-emerald-500 uppercase">Live Sync</span>
                </div>
                <button onclick="toggleRecent()" class="bg-dark-800 px-4 py-2 rounded-xl text-sm font-bold border border-white/5 hover:bg-zinc-800 transition-all">🕒 Recent</button>
                <div id="clock" class="text-2xl font-black text-amber-500 font-mono border-l border-white/10 pl-4">00:00</div>
            </div>
        </header>

        <main class="flex-1 p-6 overflow-y-auto">
            <div id="ticketsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20">
                <p class="col-span-full text-center text-zinc-500 mt-20 font-bold">Connecting to Cloud...</p>
            </div>
        </main>

        <div id="recentDrawer" class="fixed inset-y-0 right-0 w-80 bg-dark-900 border-l border-white/10 shadow-2xl translate-x-full transition-transform duration-300 z-50 flex flex-col">
            <div class="p-5 border-b border-white/10 flex justify-between items-center bg-dark-950">
                <h3 class="font-bold">🕒 Completed</h3>
                <button onclick="toggleRecent()" class="text-2xl">&times;</button>
            </div>
            <div id="recentList" class="p-4 overflow-y-auto flex flex-col gap-3"></div>
        </div>
    </div>

    <div id="printArea" class="hidden"></div>
    <audio id="bell" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        // CONFIGURACIÓN - PEGA TU URL AQUÍ
        const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxLyallT2NNIfT6inzajJrouL510bjR27dLxIpwGo5_yFWXHv0cCJ9kDeSj4ZFL6LOe/exec';
        const PIN_CORRECTO = '1999';

        let ordersData = [];
        let knownIds = new Set();

        // 1. SEGURIDAD
        function verifyPin() {
            const input = document.getElementById('pinInput').value;
            if (input === PIN_CORRECTO) {
                sessionStorage.setItem('kdsAuth', 'true');
                startKDS();
            } else {
                alert("Incorrect PIN");
                document.getElementById('pinInput').value = '';
            }
        }

        function startKDS() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('kdsApp').classList.remove('hidden');
            document.getElementById('kdsApp').classList.add('flex');
            
            // Reloj
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit'});
            }, 1000);

            fetchOrders();
            setInterval(fetchOrders, 15000);
        }

        // Carga automática si ya se logueó
        if (sessionStorage.getItem('kdsAuth') === 'true') startKDS();

        // 2. FETCH DE DATOS
        async function fetchOrders() {
            try {
                const res = await fetch(WEBHOOK_URL);
                const data = await res.json();
                ordersData = data;
                renderTickets();
            } catch (e) { console.error("Error fetching:", e); }
        }

        // 3. RENDERIZADO CON SEMÁFORO
        function renderTickets() {
            const container = document.getElementById('ticketsContainer');
            const completed = JSON.parse(localStorage.getItem('elPatoCompleted') || '[]');
            const pending = ordersData.filter(o => !completed.includes(String(o.id)));
            
            container.innerHTML = '';
            
            if (pending.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-20 opacity-30 text-3xl font-bold">KITCHEN CLEAR 🍽️</div>';
                return;
            }

            pending.forEach(order => {
                // Sonido para nuevos
                if (!knownIds.has(String(order.id))) {
                    document.getElementById('bell').play();
                    knownIds.add(String(order.id));
                }

                // Cálculo de tiempo (Semáforo)
                const orderTime = new Date(order.fecha);
                const diff = Math.floor((new Date() - orderTime) / 60000);
                let urgencyClass = "border-zinc-800";
                let delayTag = "";

                if (diff >= 15) {
                    urgencyClass = "border-red-600 animate-pulse border-4";
                    delayTag = `<span class="bg-red-600 text-white text-[10px] px-2 py-1 rounded absolute top-2 right-2 font-black">🚨 DELAYED ${diff}m</span>`;
                } else if (diff >= 10) {
                    urgencyClass = "border-amber-500 border-2";
                }

                const ticket = document.createElement('div');
                ticket.className = `ticket-enter bg-white text-zinc-900 rounded-2xl overflow-hidden flex flex-col shadow-2xl relative ${urgencyClass}`;
                ticket.innerHTML = `
                    ${delayTag}
                    <div class="bg-zinc-900 text-white p-3 flex justify-between items-center">
                        <span class="font-black text-sm">#${order.id}</span>
                        <span class="font-mono text-xs opacity-60">${new Date(order.fecha).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div class="p-4 border-b border-zinc-100 bg-amber-50">
                        <p class="text-[10px] font-bold text-amber-800 uppercase">Customer</p>
                        <h3 class="text-xl font-black truncate">${order.cliente}</h3>
                        ${order.detalles.includes('| Notas:') && order.detalles.split('| Notas:')[1].trim() !== 'Ninguna' ? 
                            `<div class="mt-2 bg-red-600 text-white p-2 rounded-lg text-xs font-bold italic">⚠️ ${order.detalles.split('| Notas:')[1]}</div>` : ''}
                    </div>
                    <div class="p-4 flex-1 font-bold text-lg">
                        <ul class="space-y-2">${order.pedido.split('\n').map(line => `<li>${line}</li>`).join('')}</ul>
                    </div>
                    <div class="p-3 bg-zinc-50 flex gap-2">
                        <button onclick="printOrder('${order.id}')" class="bg-zinc-200 p-3 rounded-xl hover:bg-zinc-300 transition-all">🖨️</button>
                        <button onclick="completeOrder('${order.id}')" class="flex-1 bg-emerald-500 text-white font-black py-3 rounded-xl hover:bg-emerald-600 shadow-md">✅ DONE</button>
                    </div>
                `;
                container.appendChild(ticket);
            });
            updateRecentList();
        }

        // 4. COMPLETAR Y RECIENTES
        function completeOrder(id) {
            let completed = JSON.parse(localStorage.getItem('elPatoCompleted') || '[]');
            completed.push(String(id));
            localStorage.setItem('elPatoCompleted', JSON.stringify(completed));
            renderTickets();
        }

        function toggleRecent() {
            document.getElementById('recentDrawer').classList.toggle('translate-x-full');
        }

        function updateRecentList() {
            const list = document.getElementById('recentList');
            const completedIds = JSON.parse(localStorage.getItem('elPatoCompleted') || '[]');
            const history = ordersData.filter(o => completedIds.includes(String(o.id))).slice(-10).reverse();
            
            list.innerHTML = history.map(o => `
                <div class="bg-dark-800 p-3 rounded-xl border border-white/5">
                    <div class="flex justify-between text-[10px] font-bold text-zinc-500 mb-1">
                        <span>#${o.id}</span> <span>${o.cliente}</span>
                    </div>
                    <button onclick="restoreOrder('${o.id}')" class="w-full bg-amber-500/10 text-amber-500 py-2 rounded-lg text-xs font-bold border border-amber-500/20">↩️ Restore</button>
                </div>
            `).join('');
        }

        function restoreOrder(id) {
            let completed = JSON.parse(localStorage.getItem('elPatoCompleted') || '[]');
            completed = completed.filter(i => i !== String(id));
            localStorage.setItem('elPatoCompleted', JSON.stringify(completed));
            renderTickets();
        }

        // 5. IMPRESIÓN TÉRMICA
        function printOrder(id) {
            const order = ordersData.find(o => String(o.id) === String(id));
            const area = document.getElementById('printArea');
            area.innerHTML = `
                <div style="text-align:center; padding: 20px 0;">
                    <h1 style="font-size: 24px; margin:0;">EL PATO</h1>
                    <p style="font-size: 10px; margin:0;">Kitchen Ticket</p>
                    <hr style="border: 1px dashed #000; margin: 10px 0;">
                    <div style="text-align:left; font-size: 12px;">
                        <p><b>Order:</b> #${order.id}</p>
                        <p><b>Time:</b> ${new Date(order.fecha).toLocaleString()}</p>
                        <p><b>Customer:</b> ${order.cliente}</p>
                    </div>
                    <hr style="border: 1px dashed #000; margin: 10px 0;">
                    <div style="text-align:left; font-size: 14px; font-weight:bold;">
                        ${order.pedido.replace(/\n/g, '<br>')}
                    </div>
                    <hr style="border: 1px dashed #000; margin: 10px 0;">
                    <p style="font-size: 10px;">BAM LABS Systems</p>
                </div>
            `;
            window.print();
        }
    </script>
</body>
</html>
